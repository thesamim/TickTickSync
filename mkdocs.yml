site_name: TickTickSync
site_url: https://thesamim.github.io/TickTickSync/
site_description: Bidirectional synchronization between Obsidian and TickTick
repo_url: https://github.com/thesamim/TickTickSync
repo_name: thesamim/TickTickSync
edit_uri: edit/master/docs-src/

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - content.action.edit
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Login: login.md
  - Configuration:
    - Overview: configuration/index.md
    - Access Control: configuration/access-control.md
    - Sync Control: configuration/sync-control.md
    - Maintenance: configuration/maintenance.md
    - Debug Options: configuration/debug-options.md
    - Task Settings: configuration/task-settings.md
    - Notes: configuration/notes.md
  - Task Format: task-format.md
  - Moving Tasks: moving-tasks.md
  - Changelog: changelog.md
  - Troubleshooting: troubleshooting/index.md
  - Acknowledgments: acknowledgments.md

docs_dir: docs-src
site_dir: site

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true
